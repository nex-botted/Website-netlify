<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Incognito — Key System</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:#0b0e0c;
  color:#fff;
  font-family:'Sora',sans-serif;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  cursor:none;
}
.bg-grid{
  position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,0.022) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.022) 1px,transparent 1px);
  background-size:64px 64px;
  pointer-events:none;z-index:0;
}
.bg-noise{
  position:fixed;inset:0;opacity:.018;pointer-events:none;z-index:1;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}
.glow{
  position:fixed;width:600px;height:400px;
  background:radial-gradient(ellipse,rgba(255,255,255,0.04),transparent 70%);
  top:50%;left:50%;transform:translate(-50%,-55%);
  pointer-events:none;z-index:0;
}
#cur{position:fixed;width:22px;height:22px;pointer-events:none;z-index:9999;transform:translate(-50%,-50%)}
#cur::before,#cur::after{content:'';position:absolute;background:rgba(255,255,255,0.7);border-radius:1px}
#cur::before{width:1px;height:100%;left:50%;top:0;transform:translateX(-50%)}
#cur::after{width:100%;height:1px;top:50%;left:0;transform:translateY(-50%)}
#cur-ring{
  position:fixed;width:42px;height:42px;
  border:1px solid rgba(255,255,255,0.18);
  border-radius:50%;pointer-events:none;z-index:9998;
  transform:translate(-50%,-50%);
  transition:width .2s,height .2s;
}
.card{
  position:relative;z-index:2;
  width:min(500px,calc(100vw - 40px));
  background:rgba(14,18,16,0.95);
  border:1px solid rgba(255,255,255,0.09);
  border-radius:24px;
  padding:44px 40px 40px;
  text-align:center;
  box-shadow:0 40px 80px rgba(0,0,0,0.6),inset 0 1px 0 rgba(255,255,255,0.06);
  animation:cardIn .5s cubic-bezier(.22,1,.36,1) both;
}
@keyframes cardIn{from{opacity:0;transform:translateY(20px) scale(.97)}to{opacity:1;transform:none}}
.logo{
  height:48px;width:auto;
  filter:brightness(0) invert(1);
  margin-bottom:32px;
}
.steps{
  display:flex;align-items:center;justify-content:center;
  gap:0;margin-bottom:36px;
}
.step-item{
  display:flex;flex-direction:column;align-items:center;gap:7px;
  position:relative;
}
.step-circle{
  width:36px;height:36px;border-radius:50%;
  border:1.5px solid rgba(255,255,255,0.12);
  display:flex;align-items:center;justify-content:center;
  font-family:'JetBrains Mono',monospace;
  font-size:13px;font-weight:700;
  color:rgba(255,255,255,0.3);
  background:rgba(255,255,255,0.03);
  transition:all .4s ease;
  position:relative;z-index:1;
}
.step-circle.done{
  background:rgba(255,255,255,0.9);
  border-color:transparent;color:#000;
}
.step-circle.active{
  border-color:rgba(255,255,255,0.6);
  color:rgba(255,255,255,0.9);
  background:rgba(255,255,255,0.06);
  box-shadow:0 0 20px rgba(255,255,255,0.12);
}
.step-label{
  font-size:10px;font-family:'JetBrains Mono',monospace;
  color:rgba(255,255,255,0.25);letter-spacing:.1em;text-transform:uppercase;
  transition:color .3s;
}
.step-label.active{color:rgba(255,255,255,0.55);}
.step-label.done{color:rgba(255,255,255,0.4);}
.step-line{
  width:60px;height:1px;
  background:rgba(255,255,255,0.08);
  margin:0 -2px;margin-bottom:23px;
  position:relative;overflow:hidden;
}
.step-line.filled::after{
  content:'';position:absolute;inset:0;
  background:rgba(255,255,255,0.35);
  animation:fillLine .5s ease both;
}
@keyframes fillLine{from{transform:scaleX(0);transform-origin:left}to{transform:scaleX(1)}}
.countdown-wrap{
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 28px;width:100px;height:100px;
  position:relative;
}
.countdown-svg{position:absolute;inset:0;transform:rotate(-90deg)}
.countdown-track{fill:none;stroke:rgba(255,255,255,0.06);stroke-width:2.5}
.countdown-arc{
  fill:none;stroke:rgba(255,255,255,0.75);stroke-width:2.5;
  stroke-linecap:round;
  stroke-dasharray:283;
  stroke-dashoffset:0;
  transition:stroke-dashoffset .08s linear;
}
.countdown-num{
  font-size:38px;font-weight:800;letter-spacing:-.03em;
  line-height:1;color:#fff;
  font-family:'Sora',sans-serif;
}
.state{display:none}
.state.active{display:block;animation:fadeIn .35s ease both}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.spinner{
  width:44px;height:44px;border-radius:50%;
  border:2px solid rgba(255,255,255,0.08);
  border-top-color:rgba(255,255,255,0.6);
  animation:spin .8s linear infinite;
  margin:0 auto 24px;
}
@keyframes spin{to{transform:rotate(360deg)}}
.state-title{
  font-size:18px;font-weight:700;margin-bottom:8px;letter-spacing:-.02em;
}
.state-sub{
  font-size:13px;color:rgba(255,255,255,0.4);line-height:1.7;
}
.countdown-label{
  font-size:13px;color:rgba(255,255,255,0.4);margin-top:-6px;margin-bottom:0;
}
.err-icon{font-size:40px;margin-bottom:16px}
.err-title{font-size:18px;font-weight:700;margin-bottom:8px;color:#fff}
.err-msg{
  font-size:12.5px;font-family:'JetBrains Mono',monospace;
  color:rgba(255,255,255,0.4);line-height:1.7;
  background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);
  border-radius:10px;padding:12px 16px;margin-bottom:20px;
}
.retry-btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:10px 22px;background:#fff;color:#000;
  font-size:13px;font-weight:700;font-family:'Sora',sans-serif;
  border:none;border-radius:100px;cursor:pointer;
  transition:background .2s,transform .2s;text-decoration:none;
}
.retry-btn:hover{background:#e8e8e8;transform:translateY(-1px)}
.card-footer{
  margin-top:28px;padding-top:20px;
  border-top:1px solid rgba(255,255,255,0.06);
  font-size:11px;font-family:'JetBrains Mono',monospace;
  color:rgba(255,255,255,0.2);
  display:flex;align-items:center;justify-content:space-between;
}
.status-pill{
  display:inline-flex;align-items:center;gap:6px;
  padding:3px 10px;border-radius:100px;
  border:1px solid rgba(255,255,255,0.1);
  font-size:10px;
}
.sdot{width:5px;height:5px;border-radius:50%;background:#fff;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
/* Overlay to block all interaction while processing */
#lock-overlay{
  display:none;position:fixed;inset:0;z-index:8000;cursor:not-allowed;
}
#lock-overlay.active{display:block;}
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-noise"></div>
<div class="glow"></div>
<div id="cur"></div>
<div id="cur-ring"></div>
<div id="lock-overlay"></div>

<div class="card" id="card">

  <img src="https://i.ibb.co/bgTn718C/1122.png" alt="Incognito" class="logo" id="logo">

  <div class="steps" id="steps-row">
    <div class="step-item">
      <div class="step-circle" id="s1">1</div>
      <div class="step-label" id="sl1">Link 1</div>
    </div>
    <div class="step-line" id="line1"></div>
    <div class="step-item">
      <div class="step-circle" id="s2">2</div>
      <div class="step-label" id="sl2">Link 2</div>
    </div>
    <div class="step-line" id="line2"></div>
    <div class="step-item">
      <div class="step-circle" id="s3">3</div>
      <div class="step-label" id="sl3">Link 3</div>
    </div>
  </div>

  <div class="state" id="state-loading">
    <div class="spinner"></div>
    <div class="state-title">Verifying...</div>
    <div class="state-sub">Checking your progress with our servers.</div>
  </div>

  <div class="state" id="state-countdown">
    <div class="countdown-wrap">
      <svg class="countdown-svg" viewBox="0 0 100 100">
        <circle class="countdown-track" cx="50" cy="50" r="45"/>
        <circle class="countdown-arc" cx="50" cy="50" r="45" id="arc"/>
      </svg>
      <div class="countdown-num" id="cnum">3</div>
    </div>
    <div class="state-title" id="cd-title">Continuing...</div>
    <div class="state-sub countdown-label" id="cd-sub">Redirecting you to the next step</div>
  </div>

  <div class="state" id="state-error">
    <div class="err-icon">⚠</div>
    <div class="err-title" id="err-title">Something went wrong</div>
    <div class="err-msg" id="err-msg">Unknown error</div>
    <a href="/" class="retry-btn" id="retry-btn">← Back to Home</a>
  </div>

  <div class="card-footer">
    <span>incognito key system</span>
    <span class="status-pill"><span class="sdot"></span> UNDETECTED</span>
  </div>
</div>

<script>
(function () {
  'use strict';

  // ── CONSTANTS ────────────────────────────────────────────────────────────────
  var COUNTDOWN_SECS   = 3;
  var FETCH_TIMEOUT_MS = 10000;
  var SID_PATTERN      = /^[A-Za-z0-9_\-]{8,128}$/;
  var VALID_STEPS      = ['1', '2', '3', 'done'];
  var STEP_COOKIE_KEY  = 'incognito_sid';
  var TOKEN_COOKIE_KEY = 'incognito_st';
  var NONCE_COOKIE_KEY = 'incognito_nc';
  var TS_COOKIE_KEY    = 'incognito_ts';

  // Minimum ms that must elapse between step initiations (anti-spam).
  // Backend must also enforce this; this is a supplemental client-side brake.
  var MIN_STEP_INTERVAL_MS = 1500;

  // ── GLOBAL LOCK ──────────────────────────────────────────────────────────────
  // Prevents ANY re-entry: duplicate calls, rapid navigation, race conditions.
  var _locked = false;

  function acquireLock() {
    if (_locked) return false;
    _locked = true;
    document.getElementById('lock-overlay').classList.add('active');
    return true;
  }

  // Once locked for a step, we never release within this page load —
  // the page either redirects or shows an error (terminal state).

  // ── DOM HELPERS ──────────────────────────────────────────────────────────────
  function $(id) { return document.getElementById(id); }

  function showState(name) {
    ['loading', 'countdown', 'error'].forEach(function (s) {
      $('state-' + s).classList.toggle('active', s === name);
    });
  }

  // ── SAFE ERROR DISPLAY ───────────────────────────────────────────────────────
  // Accepts only safe, generic messages — never echoes raw server/API output.
  function showError(title, code) {
    var safeMessages = {
      'session_missing':    'Start the flow from your executor.',
      'session_invalid':    'Your session ID is invalid. Please restart.',
      'step_invalid':       'This link is not valid. Please restart.',
      'step_order':         'Steps must be completed in order.',
      'rate_limited':       'Please wait before trying again.',
      'server_error':       'Server error. Please try again shortly.',
      'network_error':      'Network error. Check your connection.',
      'timeout':            'Request timed out. Check your connection.',
      'unexpected':         'An unexpected error occurred. Please restart.',
      'bad_response':       'Received an invalid response from the server.',
      'completion_invalid': 'Could not verify step completion.',
    };

    showState('error');
    $('err-title').textContent = String(title).substring(0, 64);
    $('err-msg').textContent   = safeMessages[code] || safeMessages['unexpected'];
  }

  // ── COOKIE HELPERS ───────────────────────────────────────────────────────────
  function setCookie(name, value, minutes) {
    var expires = new Date(Date.now() + minutes * 60000).toUTCString();
    document.cookie = encodeURIComponent(name) + '=' + encodeURIComponent(value)
      + ';expires=' + expires + ';path=/;SameSite=Strict;Secure';
  }

  function getCookie(name) {
    var key  = encodeURIComponent(name);
    var match = document.cookie.match('(^|;)\\s*' + key + '\\s*=\\s*([^;]+)');
    if (!match) return null;
    try { return decodeURIComponent(match[2]); } catch (e) { return null; }
  }

  function deleteCookie(name) {
    document.cookie = encodeURIComponent(name)
      + '=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/;SameSite=Strict';
  }

  // ── NONCE (one-use replay mitigation) ────────────────────────────────────────
  function generateNonce() {
    var arr = new Uint8Array(16);
    crypto.getRandomValues(arr);
    return Array.from(arr).map(function(b){ return b.toString(16).padStart(2,'0'); }).join('');
  }

  function rotateNonce() {
    var nc = generateNonce();
    setCookie(NONCE_COOKIE_KEY, nc, 30);
    return nc;
  }

  // ── TIMESTAMP GUARD ──────────────────────────────────────────────────────────
  // Prevents machine-speed step cycling. Records the time the last step started.
  function recordStepTimestamp() {
    setCookie(TS_COOKIE_KEY, String(Date.now()), 30);
  }

  function isStepTooFast() {
    var raw = getCookie(TS_COOKIE_KEY);
    if (!raw) return false;
    var ts = parseInt(raw, 10);
    if (isNaN(ts)) return false;
    return (Date.now() - ts) < MIN_STEP_INTERVAL_MS;
  }

  // ── INPUT VALIDATION ─────────────────────────────────────────────────────────
  function isValidSid(sid) {
    return typeof sid === 'string' && SID_PATTERN.test(sid);
  }

  function isValidStep(step) {
    return typeof step === 'string' && VALID_STEPS.indexOf(step) !== -1;
  }

  // ── FETCH WITH TIMEOUT ───────────────────────────────────────────────────────
  function fetchWithTimeout(url, options, timeoutMs) {
    return new Promise(function (resolve, reject) {
      var timer = setTimeout(function () {
        reject(new Error('TIMEOUT'));
      }, timeoutMs);

      fetch(url, options).then(function (res) {
        clearTimeout(timer);
        resolve(res);
      }).catch(function (err) {
        clearTimeout(timer);
        reject(err);
      });
    });
  }

  // ── API CALL ─────────────────────────────────────────────────────────────────
  // Returns { ok: bool, error: string } always — never throws.
// ── API CALL ─────────────────────────────────────────────────────────────────
// Returns { ok: bool, error: string } always — never throws.
async function gateAction(sid, st, step) {

  function mapStepToAction(step) {
    if (step === '1') return 'start_1';
    if (step === '2') return 'complete_1';
    if (step === '3') return 'complete_2';
    if (step === 'done') return 'complete_3';
    return null;
  }

  var action = mapStepToAction(step);

  if (!action) {
    return { ok: false, error: 'step_invalid' };
  }

var nonce = rotateNonce();

var body = JSON.stringify({
  sessionId: sid,
  action: action,
  st: st,
  nonce: nonce
});

  var res, data;

  try {
    res = await fetchWithTimeout('/api/gate-action', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: body,
      credentials: 'same-origin',
      cache: 'no-store',
    }, FETCH_TIMEOUT_MS);
  } catch (err) {
    if (err && err.message === 'TIMEOUT') {
      return { ok: false, error: 'timeout' };
    }
    return { ok: false, error: 'network_error' };
  }

  if (!res.ok) {
    if (res.status === 429) return { ok: false, error: 'rate_limited' };
    if (res.status >= 500) return { ok: false, error: 'server_error' };
    return { ok: false, error: 'step_order' };
  }

  try {
    data = await res.json();
  } catch (e) {
    return { ok: false, error: 'bad_response' };
  }

  if (typeof data !== 'object' || data === null) {
    return { ok: false, error: 'bad_response' };
  }

  return {
    ok: data.ok === true,
    error: typeof data.error === 'string' ? data.error : 'unexpected',
  };
}

  // ── STEP INDICATOR UPDATE ────────────────────────────────────────────────────
  function updateStepUI(activeStep) {
    // activeStep: 1, 2, 3, or 4 (done)
    for (var i = 1; i <= 3; i++) {
      var circle = $('s' + i);
      var label  = $('sl' + i);
      circle.classList.remove('done', 'active');
      label.classList.remove('done', 'active');
      if (i < activeStep) {
        circle.classList.add('done');
        label.classList.add('done');
      } else if (i === activeStep) {
        circle.classList.add('active');
        label.classList.add('active');
      }
    }
    // Lines
    for (var j = 1; j <= 2; j++) {
      var line = $('line' + j);
      line.classList.toggle('filled', j < activeStep);
    }
  }

  // ── COUNTDOWN + REDIRECT ─────────────────────────────────────────────────────
  // destination must be validated before calling this function.
  function startCountdown(titleText, subText, destination) {
    $('cd-title').textContent = String(titleText).substring(0, 80);
    $('cd-sub').textContent   = String(subText).substring(0, 120);
    showState('countdown');

    var t        = COUNTDOWN_SECS;
    var arc      = $('arc');
    var circumf  = 283; // 2π × r(45)

    $('cnum').textContent = t;
    arc.style.strokeDashoffset = '0';

    var interval = setInterval(function () {
      t--;
      var progress = (COUNTDOWN_SECS - t) / COUNTDOWN_SECS;
      arc.style.strokeDashoffset = String(progress * circumf);
      $('cnum').textContent = Math.max(t, 0);

      if (t <= 0) {
        clearInterval(interval);
        // Hard redirect — no JS navigation that can be spoofed.
        window.location.replace(destination);
      }
    }, 1000);
  }

  // ── SAFE URL BUILDER ─────────────────────────────────────────────────────────
  // Only returns URLs that belong to known safe patterns.
  var LV_LINKS = {
    '1': 'https://link-hub.net/5418777/Hp6R8sD9NW4S',
    '2': 'https://link-target.net/5418777/7LM5gMCFdkGP',
    '3': 'https://direct-link.net/5418777/YgEOqFalsihT',
  };

  function keyPageUrl() {
    // Keep session identifiers out of URL query params.
    return '/key';
  }

  // ── MAIN FLOW ────────────────────────────────────────────────────────────────
  async function run() {
    // 1. Parse and strictly validate URL parameters.
    var params = new URLSearchParams(window.location.search);
    var step   = params.get('step');
    var sidParam = params.get('sid');
    var stParam = params.get('st');

    // Immediately wipe the SID from the URL bar to reduce shoulder-surfing risk.
    // This is cosmetic but reduces accidental sharing.
    if (sidParam && window.history && window.history.replaceState) {
      var cleanUrl = window.location.pathname + '?step=' + encodeURIComponent(step || '');
      window.history.replaceState(null, '', cleanUrl);
    }

    // 2. Validate step parameter before anything else.
    if (!isValidStep(step)) {
      showError('Invalid Page', 'step_invalid');
      return;
    }

    // 3. Resolve SID — URL param takes precedence (entry point), else cookie.
    var sid = isValidSid(sidParam) ? sidParam
            : isValidSid(getCookie(STEP_COOKIE_KEY)) ? getCookie(STEP_COOKIE_KEY)
            : null;
    var st = (typeof stParam === 'string' && stParam.length > 20) ? stParam : getCookie(TOKEN_COOKIE_KEY);

    // 4. Acquire the lock. If already processing, do nothing.
    if (!acquireLock()) return;

    // 5. Anti-spam timing guard.
    if (isStepTooFast()) {
      showError('Too Fast', 'rate_limited');
      return;
    }
    recordStepTimestamp();

    // ── STEP 1 ────────────────────────────────────────────────────────────────
    if (step === '1') {
      if (!isValidSid(sidParam)) {
        showError('Invalid Link', 'session_invalid');
        return;
      }

      // Persist SID in cookie (30 min). Overwrite any prior cookie.
      deleteCookie(STEP_COOKIE_KEY);
      setCookie(STEP_COOKIE_KEY, sidParam, 30);
      if (stParam) setCookie(TOKEN_COOKIE_KEY, stParam, 30);
      sid = sidParam;
      st = stParam || st;

      updateStepUI(1);
      showState('loading');

      var r1 = await gateAction(sid, st, 1);
      if (!r1.ok) {
        showError('Step 1 Failed', r1.error);
        return;
      }

      startCountdown('Opening Link 1', 'Complete it to continue', LV_LINKS['1']);
      return;
    }

    // ── STEPS 2, 3, done — require a valid SID from cookie ───────────────────
    if (!isValidSid(sid)) {
      showError('Session Missing', 'session_missing');
      return;
    }

    // ── STEP 2 ────────────────────────────────────────────────────────────────
    if (step === '2') {
      updateStepUI(2);
      showState('loading');

      var r2 = await gateAction(sid, st, 2);
      if (!r2.ok) {
        showError('Step 2 Failed', r2.error);
        return;
      }

      startCountdown('Opening Link 2', 'Keep going\u2026', LV_LINKS['2']);
      return;
    }

    // ── STEP 3 ────────────────────────────────────────────────────────────────
    if (step === '3') {
      updateStepUI(3);
      showState('loading');

      var r3 = await gateAction(sid, st, 3);
      if (!r3.ok) {
        showError('Step 3 Failed', r3.error);
        return;
      }

      startCountdown('Opening Link 3', 'Final step\u2026', LV_LINKS['3']);
      return;
    }

    // ── DONE ──────────────────────────────────────────────────────────────────
    // Must verify with backend that ALL prior steps are complete.
    // Never allow reaching /key without a successful server confirmation.
    if (step === 'done') {
      updateStepUI(4);
      showState('loading');

      var rd = await gateAction(sid, st, 'done');
      if (!rd.ok) {
        showError('Completion Failed', rd.error || 'completion_invalid');
        return;
      }

      var dest = keyPageUrl();
      if (!dest) {
        showError('Session Error', 'session_invalid');
        return;
      }

      // Clear SID cookie after confirmed completion so it cannot be replayed.
      deleteCookie(STEP_COOKIE_KEY);
      deleteCookie(NONCE_COOKIE_KEY);
      deleteCookie(TS_COOKIE_KEY);

      startCountdown('All Done', 'Generating your key\u2026', dest);
      return;
    }

    // Should be unreachable because of isValidStep check above.
    showError('Invalid Page', 'step_invalid');
  }

  // ── CUSTOM CURSOR ────────────────────────────────────────────────────────────
  (function initCursor() {
    var cur  = $('cur');
    var ring = $('cur-ring');
    var rx = 0, ry = 0, cx = 0, cy = 0;

    document.addEventListener('mousemove', function (e) {
      cx = e.clientX; cy = e.clientY;
      cur.style.left = cx + 'px';
      cur.style.top  = cy + 'px';
    });

    function animRing() {
      rx += (cx - rx) * 0.12;
      ry += (cy - ry) * 0.12;
      ring.style.left = rx + 'px';
      ring.style.top  = ry + 'px';
      requestAnimationFrame(animRing);
    }
    animRing();
  })();

  // ── BOOT ─────────────────────────────────────────────────────────────────────
  // Wrap run() so any unhandled exception is caught safely.
  run().catch(function () {
    showError('Unexpected Error', 'unexpected');
  });

})();
</script>
</body>
