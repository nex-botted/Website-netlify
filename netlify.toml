[functions]
  node_bundler = "esbuild"

# Public function gateway only
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Allow-list public pages
[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/index.html"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/gate"
  to = "/gate.html"
  status = 200

[[redirects]]
  from = "/gate.html"
  to = "/gate.html"
  status = 200

[[redirects]]
  from = "/key"
  to = "/key.html"
  status = 200

[[redirects]]
  from = "/key.html"
  to = "/key.html"
  status = 200

[[redirects]]
  from = "/beta"
  to = "/beta.html"
  status = 200

[[redirects]]
  from = "/beta.html"
  to = "/beta.html"
  status = 200


[[redirects]]
  from = "/security-client.js"
  to = "/security-client.js"
  status = 200

[[redirects]]
  from = "/.netlify/scripts/rum"
  to = "/.netlify/scripts/rum"
  status = 200

# Block known probing and malformed request patterns
[[redirects]]
  from = "/.netlify/scripts/*"
  to = "/.netlify/functions/block-probe"
  status = 403
  force = true

[[redirects]]
  from = "/GEThttps*"
  to = "/.netlify/functions/block-probe"
  status = 403
  force = true

[[redirects]]
  from = "/*://*"
  to = "/.netlify/functions/block-probe"
  status = 403
  force = true

[[redirects]]
  from = "/.netlify/functions/block-probe"
  to = "/.netlify/functions/block-probe"
  status = 200

[[redirects]]
  from = "/.netlify/functions/*"
  to = "/.netlify/functions/block-probe"
  status = 403
  force = true

[[redirects]]
  from = "/netlify/functions/*"
  to = "/.netlify/functions/block-probe"
  status = 403
  force = true

[[redirects]]
  from = "/netlify/*"
  to = "/.netlify/functions/block-probe"
  status = 403
  force = true

# Default deny: any non-allowlisted route is blocked
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/block-probe"
  status = 403
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer"
    Permissions-Policy = "geolocation=(), camera=(), microphone=()"
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Resource-Policy = "same-origin"
    X-Robots-Tag = "noindex, nofollow, noarchive"
    X-Permitted-Cross-Domain-Policies = "none"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; script-src-attr 'none'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://i.ibb.co; font-src 'self' https://fonts.gstatic.com; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; frame-src 'none'; form-action 'self'; upgrade-insecure-requests"

[[headers]]
  for = "/403.html"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"
